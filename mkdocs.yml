site_name: Fri3d 2026
site_url: https://fri3dcamp.github.io/badge_2026/
docs_dir: docs

theme:
  name: material
  logo: assets/logo_white.svg
  favicon: assets/favicon-96x96.png
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.select
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

hooks:
  - mkdocs_hooks/i18n_theme_compat.py

nav:
  - index.md
  - mcp.md

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
        - locale: nl
          default: true
          name: Nederlands
