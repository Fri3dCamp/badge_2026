  <rect x="24" y="24" width="1152" height="627" fill="none" stroke="#9ca3af" stroke-width="4" stroke-dasharray="14 10" />
  <text x="600" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" fill="#374151">Image Not Added Yet</text>
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#6b7280">Please upload the final assembly photo</text>
</svg>